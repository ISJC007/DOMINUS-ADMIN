<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMINUS | MASTER CONTROL</title>
    <link rel="stylesheet" href="DA-STYLES/STYLES.css">
</head>
<body>

    <div id="da-loading-screen">
    <div class="loader-box">
        <h1>DOMINUS <span>ADMIN</span></h1>
        <div class="loading-dots">
            <span>.</span><span>.</span><span>.</span>
        </div>
    </div>
</div>

    <div id="da-app">
        <header class="main-header">
            <div class="logo-area">
                <h1>DOMINUS <span>ADMIN</span></h1>
                <div class="status-pulse"><span id="da-status-text">SYSTEM ONLINE</span></div>
            </div>
            <div class="header-stats">
                <div class="stat-mini">Ventas: <span id="da-total-ventas">0</span></div>
                <div class="stat-mini">Red: <span id="da-users-online">0</span></div>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="glass-card control-panel">
                <div class="card-header">
                    <h2><span class="icon">⚙️</span> CONTROL MAESTRO</h2>
                    <div class="live-tag">LIVE</div>
                </div>
                <div class="tools-grid">
                    <div class="tool-item">
                        <span>Mantenimiento</span>
                        <label class="cyber-switch">
                            <input type="checkbox" id="check-mantenimiento" onclick="DA_Core.toggleMantenimiento(this.checked)">
                            <span class="cyber-slider"></span>
                        </label>
                    </div>
                    <div class="tool-item broadcast">
                        <input type="text" id="broadcast-msg" placeholder="Broadcast a la red...">
                        <button onclick="DA_Core.enviarBroadcast()">📢</button>
                    </div>
                </div>
            </section>

            <section class="glass-card pending-section">
                <div class="card-header">
                    <h2><span class="icon">⏳</span> SOLICITUDES</h2>
                    <span id="da-count-pending" class="badge">0</span>
                </div>
                <div id="da-list-pending" class="da-list-container">
                    <div class="loader"></div>
                </div>
            </section>

            <section class="glass-card active-section">
                <div class="card-header">
                    <h2><span class="icon">🛡️</span> USUARIOS ACTIVOS</h2>
                    <input type="text" id="da-search-active" placeholder="Filtrar nodo..." oninput="DA_Core.filtrarActivos(this.value)">
                </div>
                <div id="da-list-active" class="da-list-container">
                    <div class="loader"></div>
                </div>
            </section>

            <section class="glass-card log-section">
                <div class="card-header"><h2><span class="icon">📜</span> LOG DE EVENTOS</h2></div>
                <div id="da-audit-log" class="da-log-viewer"></div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="DA-JS/DA-Cloud.js"></script>
    <script src="DA-JS/DA-Core.js"></script>
</body>
</html>
